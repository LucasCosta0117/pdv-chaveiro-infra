services:
# 1. SERVIÇO DO BANCO DE DADOS
  db:
    image: postgres:15-alpine
    container_name: pdv_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - pdv_network
# 2. SERVIÇO DO BACK-END
  backend:
    build:
      # Diz ao Docker para "voltar uma pasta" e procurar o Dockerfile no repositório do back-end
      context: ../pdv-chaveiro-back
      dockerfile: Dockerfile
    container_name: pdv_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Variáveis injetadas no application.properties
      - DB_HOST=pdv_db # Aponta para o nome do container do banco
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - PASSWORD_TOKEN_JWT=${PASSWORD_TOKEN_JWT}
      - API_SECURITY_CORS_ALLOWED_ORIGINS=${CORS_ORIGINS}
      
      # Perfil do Spring Boot:
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - db # O Java só sobe depois que o banco estiver rodando
    networks:
      - pdv_network
# 3. SERVIÇO DO FRONT-END
  frontend:
    build:
      context: ../pdv-chaveiro-front
      dockerfile: Dockerfile
    container_name: pdv_frontend
    restart: unless-stopped
    ports:
      - "80:80" # Mapeia a porta 80 do Nginx para a porta 80 local
    depends_on:
      - backend
    networks:
      - pdv_network

volumes:
  pgdata:
    name: pdv_pgdata

networks:
  pdv_network:
    name: pdv_bridge
    driver: bridge